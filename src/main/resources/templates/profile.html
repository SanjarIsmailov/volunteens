<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — Volunteens</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #0f0e0b;
      --paper:  #f5f0e8;
      --cream:  #ede6d6;
      --gold:   #c8933a;
      --dark:   #1a1610;
      --muted:  #7a6f60;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: repeating-linear-gradient(
              transparent, transparent 39px, rgba(200,147,58,.08) 40px
      );
      pointer-events: none;
    }

    /* ── nav ── */
    nav {
      position: relative; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 24px 60px;
      border-bottom: 1px solid rgba(0,0,0,.07);
      background: rgba(245,240,232,.9);
      backdrop-filter: blur(8px);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--dark);
      text-decoration: none;
    }
    .logo span { color: var(--gold); }

    .nav-right { display: flex; gap: 12px; align-items: center; }

    /* BUG FIX: replaced <a><button> with proper <a> styled as button, and form logout button */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      padding: 10px 22px;
      border-radius: 50px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all .22s ease;
    }

    .btn-primary {
      background: var(--gold);
      color: #fff;
    }
    .btn-primary:hover {
      background: #b07e2c;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(200,147,58,.3);
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid rgba(0,0,0,.12);
    }
    .btn-ghost:hover {
      background: var(--dark);
      color: var(--paper);
      border-color: var(--dark);
    }

    /* ── main content ── */
    main {
      position: relative; z-index: 5;
      max-width: 880px;
      margin: 0 auto;
      padding: 64px 40px;
    }

    .profile-header {
      display: flex;
      align-items: center;
      gap: 28px;
      margin-bottom: 56px;
    }

    .avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--dark);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-style: italic;
      color: var(--gold);
      flex-shrink: 0;
    }

    .profile-info h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--dark);
      margin-bottom: 4px;
    }

    .profile-info p {
      font-size: .9rem;
      color: var(--muted);
    }

    /* ── essays area ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--dark);
    }

    /* empty state */
    .empty-state {
      background: #fff;
      border: 1.5px dashed rgba(200,147,58,.35);
      border-radius: 16px;
      padding: 64px 40px;
      text-align: center;
    }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
      opacity: .4;
    }

    .empty-state h3 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .empty-state p {
      color: var(--muted);
      font-size: .9rem;
      margin-bottom: 28px;
    }

    /* ── essay card (for when essays exist) ── */
    .essay-grid {
      display: grid;
      gap: 20px;
    }

    .essay-card {
      background: #fff;
      border-radius: 14px;
      padding: 28px 32px;
      border: 1.5px solid rgba(0,0,0,.07);
      transition: box-shadow .2s, transform .2s;
      cursor: pointer;
    }
    .essay-card:hover {
      box-shadow: 0 8px 32px rgba(0,0,0,.08);
      transform: translateY(-2px);
    }

    .essay-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.15rem;
      color: var(--dark);
      margin-bottom: 8px;
    }

    .essay-excerpt {
      font-size: .88rem;
      color: var(--muted);
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    @media (max-width: 600px) {
      nav { padding: 20px 24px; }
      main { padding: 40px 24px; }
      .profile-header { flex-direction: column; align-items: flex-start; gap: 16px; }
    }
  </style>
</head>
<body>

<nav>
  <a th:href="@{/}" class="logo">Vol<span>unt</span>eens</a>
  <div class="nav-right">
    <!-- BUG FIX: use <a> styled as button instead of invalid <a><button> -->
    <a th:href="@{/essay/new}" class="btn btn-primary">
      ✦ New essay
    </a>
    <!-- BUG FIX: logout button stays as a form/button — correct -->
    <form th:action="@{/logout}" method="post" style="display:inline">
      <button type="submit" class="btn btn-ghost">Sign out</button>
    </form>
  </div>
</nav>

<main>
  <div class="profile-header">
    <div class="avatar">V</div>
    <div class="profile-info">
      <h1>My Profile</h1>
      <p>Welcome back — what will you write today?</p>
    </div>
  </div>

  <div class="section-header">
    <h2 class="section-title">My essays</h2>
  </div>

  <!-- Show essays if they exist (th:if / th:each to be wired by controller) -->
  <div class="essay-grid" th:if="${essays != null and not #lists.isEmpty(essays)}">
    <div class="essay-card" th:each="essay : ${essays}">
      <p class="essay-title" th:text="${essay.title}">Essay Title</p>
      <p class="essay-excerpt" th:text="${essay.content}">Essay content preview...</p>
    </div>
  </div>

  <!-- Empty state -->
  <div class="empty-state" th:if="${essays == null or #lists.isEmpty(essays)}">
    <div class="empty-icon">✍️</div>
    <h3>No essays yet</h3>
    <p>Your published essays will appear here. Ready to write your first one?</p>
    <a th:href="@{/essay/new}" class="btn btn-primary">Write my first essay</a>
  </div>
</main>

</body>
</html>
