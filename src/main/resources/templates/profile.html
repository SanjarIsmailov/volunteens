<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Profile — Volunteens</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --ink:#0f0e0b;
      --paper:#f5f0e8;
      --cream:#ede6d6;
      --gold:#c8933a;
      --dark:#1a1610;
      --muted:#7a6f60;
    }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background-image: repeating-linear-gradient(
              transparent,
              transparent 39px,
              rgba(200,147,58,.08) 40px
      );
      pointer-events: none;
    }

    nav {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 60px;
      border-bottom: 1px solid rgba(0,0,0,.07);
      background: rgba(245,240,232,.9);
      backdrop-filter: blur(8px);
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--dark);
      text-decoration: none;
    }

    .logo span {
      color: var(--gold);
    }

    .nav-right {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      padding: 10px 22px;
      border-radius: 50px;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: .22s ease;
    }

    .btn-primary {
      background: var(--gold);
      color: #fff;
    }

    .btn-primary:hover {
      background: #b07e2c;
    }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1.5px solid rgba(0,0,0,.12);
    }

    .btn-ghost:hover {
      background: var(--dark);
      color: var(--paper);
    }

    main {
      position: relative;
      z-index: 5;
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 40px;
    }

    .profile-header {
      display: flex;
      gap: 28px;
      align-items: center;
      margin-bottom: 50px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--dark);
      color: var(--gold);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      font-family: 'Playfair Display', serif;
    }

    .profile-info h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 5px;
    }

    .profile-info p {
      color: var(--muted);
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
    }

    .essay-grid {
      display: grid;
      gap: 20px;
    }

    .essay-card {
      background: #fff;
      border-radius: 14px;
      padding: 28px;
      border: 1px solid rgba(0,0,0,.08);
    }

    .essay-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      margin-bottom: 10px;
    }

    .essay-excerpt {
      color: var(--muted);
      line-height: 1.7;
    }

    .essay-actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }

    .empty-state {
      background: #fff;
      border: 2px dashed rgba(200,147,58,.35);
      border-radius: 16px;
      padding: 60px;
      text-align: center;
    }

    .empty-state h3 {
      margin: 10px 0;
      font-family: 'Playfair Display', serif;
    }

    .empty-state p {
      color: var(--muted);
      margin-bottom: 25px;
    }
  </style>
</head>
<body>

<nav>
  <a th:href="@{/}" class="logo">Vol<span>unt</span>eens</a>

  <div class="nav-right">
    <a th:href="@{/essay/new}" class="btn btn-primary">
      ✦ New Essay
    </a>

    <form th:action="@{/logout}" method="post">
      <button class="btn btn-ghost" type="submit">
        Sign Out
      </button>
    </form>
  </div>
</nav>

<main>

  <div class="profile-header">
    <div class="avatar">V</div>

    <div class="profile-info">
      <h1>My Profile</h1>
      <p>Welcome back — what will you write today?</p>
    </div>
  </div>

  <div class="section-header">
    <h2 class="section-title">My Essays</h2>
  </div>

  <div class="essay-grid"
       th:if="${essays != null and not #lists.isEmpty(essays)}">

    <div class="essay-card"
         th:each="essay : ${essays}">

      <p class="essay-title"
         th:text="${essay.title}">
      </p>

      <p class="essay-excerpt"
         th:text="${essay.content}">
      </p>

      <div class="essay-actions">

        <a th:href="@{/essay/edit/{id}(id=${essay.id})}"
           class="btn btn-primary">
          Edit
        </a>

        <form th:action="@{/essay/delete/{id}(id=${essay.id})}"
              method="post">

          <button type="submit"
                  class="btn btn-ghost"
                  onclick="return confirm('Delete this essay?')">
            Delete
          </button>

        </form>

      </div>

    </div>

  </div>

  <div class="empty-state"
       th:if="${essays == null or #lists.isEmpty(essays)}">

    <h3>No essays yet</h3>

    <p>Your published essays will appear here.</p>

    <a th:href="@{/essay/new}"
       class="btn btn-primary">
      Write My First Essay
    </a>

  </div>

</main>

</body>
</html>
