<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>New Essay</title>
</head>
<body>

<h2>Create Essay</h2>

<form>

    <input type="text"
           placeholder="Title">

    <br><br>

    <textarea rows="10"
              cols="50"
              placeholder="Write your essay">
    </textarea>

    <br><br>

    <button type="submit">
        Save Essay
    </button>

</form>

</body>
</html>
