<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Essay — Volunteens</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink:    #0f0e0b;
            --paper:  #f5f0e8;
            --cream:  #ede6d6;
            --gold:   #c8933a;
            --dark:   #1a1610;
            --muted:  #7a6f60;
        }

        body {
            background: var(--paper);
            color: var(--ink);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background-image: repeating-linear-gradient(
                    transparent, transparent 39px, rgba(200,147,58,.09) 40px
            );
            pointer-events: none;
        }

        /* ── nav ── */
        nav {
            position: relative; z-index: 10;
            display: flex; align-items: center; justify-content: space-between;
            padding: 22px 60px;
            border-bottom: 1px solid rgba(0,0,0,.07);
            background: rgba(245,240,232,.9);
            backdrop-filter: blur(8px);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--dark);
            text-decoration: none;
        }
        .logo span { color: var(--gold); }

        .btn {
            display: inline-flex; align-items: center; gap: 7px;
            font-family: 'DM Sans', sans-serif;
            font-size: .88rem;
            font-weight: 500;
            padding: 9px 20px;
            border-radius: 50px;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: all .22s ease;
        }

        .btn-primary {
            background: var(--gold);
            color: #fff;
        }
        .btn-primary:hover {
            background: #b07e2c;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(200,147,58,.3);
        }

        .btn-ghost {
            background: transparent;
            color: var(--muted);
            border: 1.5px solid rgba(0,0,0,.12);
        }
        .btn-ghost:hover {
            background: var(--dark);
            color: var(--paper);
            border-color: var(--dark);
        }

        /* ── editor layout ── */
        .editor-wrap {
            position: relative; z-index: 5;
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 760px;
            width: 100%;
            margin: 0 auto;
            padding: 60px 40px 80px;
        }

        .editor-label {
            display: flex; align-items: center; gap: 10px;
            font-size: .78rem;
            font-weight: 500;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 24px;
        }
        .editor-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(200,147,58,.25);
        }

        /* BUG FIX: added method="post", th:action, name attributes on all inputs */
        form {
            display: flex;
            flex-direction: column;
            flex: 1;
            gap: 0;
        }

        .title-input {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 700;
            color: var(--dark);
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            padding: 0 0 20px;
            border-bottom: 2px solid rgba(0,0,0,.1);
            margin-bottom: 36px;
            transition: border-color .2s;
            resize: none;
        }
        .title-input::placeholder { color: rgba(15,14,11,.2); }
        .title-input:focus { border-color: var(--gold); }

        .body-input {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.05rem;
            line-height: 1.85;
            color: var(--dark);
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            flex: 1;
            min-height: 380px;
            resize: none;
            padding: 0;
        }
        .body-input::placeholder { color: rgba(15,14,11,.25); }

        /* word count bar */
        .editor-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 36px;
            padding-top: 20px;
            border-top: 1px solid rgba(0,0,0,.08);
        }

        .word-count {
            font-size: .82rem;
            color: var(--muted);
        }

        .actions { display: flex; gap: 10px; }

        @media (max-width: 600px) {
            nav { padding: 18px 24px; }
            .editor-wrap { padding: 36px 24px 60px; }
        }
    </style>
</head>
<body>

<nav>
    <a th:href="@{/profile}" class="logo">Vol<span>unt</span>eens</a>
    <a th:href="@{/profile}" class="btn btn-ghost">← Back</a>
</nav>

<div class="editor-wrap">
    <div class="editor-label">New essay</div>

    <!-- BUG FIX: added method="post", th:action="@{/essay/save}", name on both fields -->
    <form method="post" th:action="@{/essay/save}">

        <input class="title-input"
               type="text"
               name="title"
               placeholder="Give your essay a title…"
               required>

        <textarea class="body-input"
                  name="content"
                  placeholder="Start writing your essay here. Share your experience, your thoughts, your story…"
                  required></textarea>

        <div class="editor-footer">
            <span class="word-count" id="wc">0 words</span>
            <div class="actions">
                <a th:href="@{/profile}" class="btn btn-ghost">Discard</a>
                <button type="submit" class="btn btn-primary">✦ Publish essay</button>
            </div>
        </div>

    </form>
</div>

<script>
    const ta = document.querySelector('.body-input');
    const wc = document.getElementById('wc');
    function updateWC() {
        const words = ta.value.trim().split(/\s+/).filter(w => w).length;
        wc.textContent = words + (words === 1 ? ' word' : ' words');
    }
    ta.addEventListener('input', updateWC);
</script>

</body>
</html>
