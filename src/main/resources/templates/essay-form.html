```html
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essay — Volunteens</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root{
            --ink:#0f0e0b;
            --paper:#f5f0e8;
            --gold:#c8933a;
            --dark:#1a1610;
        }

        body{
            background:var(--paper);
            min-height:100vh;
            font-family:'DM Sans',sans-serif;
        }

        nav{
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:24px 60px;
            border-bottom:1px solid rgba(0,0,0,.08);
        }

        .logo{
            text-decoration:none;
            color:var(--dark);
            font-family:'Playfair Display',serif;
            font-size:1.4rem;
        }

        .editor-wrap{
            max-width:800px;
            margin:auto;
            padding:60px 30px;
        }

        .title-input{
            width:100%;
            border:none;
            outline:none;
            background:transparent;
            font-size:2rem;
            font-family:'Playfair Display',serif;
            border-bottom:2px solid rgba(0,0,0,.1);
            padding-bottom:15px;
            margin-bottom:30px;
        }

        .body-input{
            width:100%;
            min-height:400px;
            border:none;
            outline:none;
            resize:vertical;
            background:transparent;
            line-height:1.8;
            font-size:1rem;
        }

        .footer{
            margin-top:30px;
            display:flex;
            justify-content:flex-end;
            gap:10px;
        }

        .btn{
            padding:10px 20px;
            border-radius:999px;
            border:none;
            cursor:pointer;
            text-decoration:none;
            font-size:.9rem;
        }

        .btn-primary{
            background:#c8933a;
            color:white;
        }

        .btn-ghost{
            background:white;
            color:#111;
            border:1px solid #ddd;
        }
    </style>
</head>
<body>

<nav>
    <a th:href="@{/profile}" class="logo">
        Volunteens
    </a>

    <a th:href="@{/profile}" class="btn btn-ghost">
        Back
    </a>
</nav>

<div class="editor-wrap">

    <form method="post"
          th:action="${essay != null}
            ? @{/essay/update/{id}(id=${essay.id})}
            : @{/essay/save}">

        <input type="text"
               name="title"
               class="title-input"
               th:value="${essay != null ? essay.title : ''}"
               placeholder="Give your essay a title..."
               required>

        <textarea name="content"
                  class="body-input"
                  th:text="${essay != null ? essay.content : ''}"
                  placeholder="Start writing your essay..."
                  required></textarea>

        <div class="footer">

            <a th:href="@{/profile}"
               class="btn btn-ghost">
                Cancel
            </a>

            <button type="submit"
                    class="btn btn-primary"
                    th:text="${essay != null ? 'Update Essay' : 'Publish Essay'}">
                Publish Essay
            </button>

        </div>

    </form>

</div>

</body>
</html>
```
